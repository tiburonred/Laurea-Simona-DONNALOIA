<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Laurea di Simona Donnaloia</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

<section class="hero">

    <div class="decorazione">🎓</div>

    <h1>Laurea di<br>Simona Donnaloia</h1>

    <p class="data">8 Agosto 2026</p>

    <p class="location">
        Mon Rêve Ecogreen Resort
    </p>

    <div class="foto-placeholder">
    <img src="Screenshot_20260717_095332_com_instagram_android_TransparentModalActivity.jpg" alt="Simona" class="foto-simona">
</div>

    <p class="messaggio">
        Grazie per aver condiviso con me questa giornata speciale.<br>
        Carica le tue foto e rivivi insieme a noi i momenti più belli.
    </p>

   <input type="file" id="uploadFoto" accept="image/*" multiple>
   <label for="uploadFoto" class="seleziona-foto">
     📸 Carica le tue foto
   </label>
    
<button onclick="caricaFoto()">
    📸 Carica le tue foto
</button>

<p id="messaggioUpload"></p>

</section>


<section class="galleria">

    <h2>I ricordi della serata</h2>

    <div class="foto-grid" 
    id="galleriaFoto">
    </div>

</section>


<script src="script.js"></script>

</body>
</html>
